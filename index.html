<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoInt Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --danger:    #f85149;
      --sidebar-w: 300px;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    #header {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 1000;
    }
    #header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }
    #status {
      font-size: 12px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-left: auto;
    }
    #toggle-sidebar {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      transition: all 0.15s;
    }
    #toggle-sidebar:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN LAYOUT ── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.2s ease, opacity 0.2s ease;
      overflow: hidden;
    }
    #sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

    #sidebar-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sidebar-header h2 {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    #location-filter {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-family: 'IBM Plex Sans', sans-serif;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      appearance: none;
      cursor: pointer;
    }
    #location-filter:focus { outline: none; border-color: var(--accent); }

    #search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 6px 8px;
      border-radius: 4px;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { outline: none; border-color: var(--accent); }

    #dataset-count {
      font-size: 11px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #dataset-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #dataset-list::-webkit-scrollbar { width: 4px; }
    #dataset-list::-webkit-scrollbar-track { background: transparent; }
    #dataset-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .dataset-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .dataset-item:hover { background: rgba(88,166,255,0.05); }
    .dataset-item.active { background: rgba(88,166,255,0.1); border-left: 2px solid var(--accent); }
    .dataset-item.active .item-name { color: var(--accent); }

    .item-location {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .item-name {
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text);
      line-height: 1.4;
      word-break: break-all;
    }
    .item-meta {
      display: flex;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .item-tag {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .item-tag.band { border-color: #3fb95040; color: var(--accent2); background: #3fb95010; }
    .item-tag.sat  { border-color: #58a6ff40; color: var(--accent);  background: #58a6ff10; }
    .item-tag.date { color: var(--muted); }

    .item-loading {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      padding: 8px 14px;
      opacity: 0.6;
    }
    .item-error { color: var(--danger); opacity: 0.7; }

    /* ── MAP ── */
    #map { flex: 1; }

    /* ── DETAIL PANEL (bottom of sidebar) ── */
    #detail-panel {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 12px 14px;
      flex-shrink: 0;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }
    #detail-panel.visible { display: block; }
    #detail-panel h3 {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 3px 0;
      border-bottom: 1px solid rgba(48,54,61,0.4);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { color: var(--muted); }
    .detail-val { color: var(--text); text-align: right; max-width: 55%; word-break: break-word; }

    /* loading bar */
    #load-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>GeoInt Catalog</h1>
  <button id="toggle-sidebar">&#9776; Datasets</button>
  <span id="status">Loading…</span>
  <div id="load-bar"></div>
</div>

<div id="body">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Datasets</h2>
      <select id="location-filter"><option value="">All locations</option></select>
      <input id="search-input" type="text" placeholder="Search dataset name…" />
    </div>
    <div id="dataset-count">—</div>
    <div id="dataset-list"></div>
    <div id="detail-panel">
      <h3>Collect Details</h3>
      <div id="detail-rows"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // ── MAP SETUP ──
  const map = L.map('map', { zoomControl: true }).setView([0, 0], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);

  // ── STATE ──
  const COLORS = ['#58a6ff','#3fb950','#f78166','#d2a8ff','#ffa657'];
  const locationColors = {};
  let colorIdx = 0;

  function getColor(location) {
    if (!locationColors[location]) locationColors[location] = COLORS[colorIdx++ % COLORS.length];
    return locationColors[location];
  }

  // each entry: { entry, layer, collectData }
  const allItems = [];
  let activeItem = null;

  // ── SIDEBAR TOGGLE ──
  document.getElementById('toggle-sidebar').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
    setTimeout(() => map.invalidateSize(), 220);
  });

  // ── LOAD ──
  async function loadCatalog() {
    const res = await fetch('catalog/catalog_index.json');
    const entries = await res.json();
    const total = entries.length;

    // populate location filter
    const locations = [...new Set(entries.map(e => e.location))].sort();
    const sel = document.getElementById('location-filter');
    locations.forEach(loc => {
      const opt = document.createElement('option');
      opt.value = loc; opt.textContent = loc;
      sel.appendChild(opt);
    });

    const listEl = document.getElementById('dataset-list');
    const loadBar = document.getElementById('load-bar');
    const allBounds = [];
    let loaded = 0, failed = 0;

    for (const entry of entries) {
      const relPath = encodeURI(
        entry.json_saved.replace(/\\/g, '/').replace(/^\.\//, '')
      );

      // placeholder row while loading
      const row = document.createElement('div');
      row.className = 'dataset-item';
      row.innerHTML = `<div class="item-loading">⏳ ${entry.dataset_name}</div>`;
      listEl.appendChild(row);

      try {
        const r = await fetch(relPath);
        if (!r.ok) throw new Error(r.status);
        const json = await r.json();
        const collect = json.collects?.[0];

        if (!collect?.footprintPolygonLla) throw new Error('no footprint');

        const coords = collect.footprintPolygonLla.coordinates[0];
        const latLngs = coords.map(c => [c[1], c[0]]);
        const color = getColor(entry.location);

        const layer = L.polygon(latLngs, {
          color, weight: 1.5, fillColor: color, fillOpacity: 0.12
        }).addTo(map);

        allBounds.push(...latLngs);

        const item = { entry, layer, collect, json };
        allItems.push(item);

        // build sidebar row
        const date = collect.startAtUTC
          ? collect.startAtUTC.slice(0, 10)
          : '—';
        const sat = json.umbraSatelliteName || '—';
        const band = collect.radarBand || '—';

        row.innerHTML = `
          <div class="item-location">${entry.location}</div>
          <div class="item-name">${entry.dataset_name}</div>
          <div class="item-meta">
            <span class="item-tag date">${date}</span>
            <span class="item-tag sat">${sat}</span>
            <span class="item-tag band">Band ${band}</span>
          </div>`;

        row.addEventListener('click', () => selectItem(item, row));

        layer.on('click', () => selectItem(item, row));

        loaded++;
      } catch (e) {
        row.innerHTML = `<div class="item-loading item-error">✗ ${entry.dataset_name}</div>`;
        failed++;
      }

      const done = loaded + failed;
      loadBar.style.width = (done / total * 100) + '%';
      document.getElementById('status').textContent =
        `Loading… ${done}/${total}`;
    }

    if (allBounds.length) map.fitBounds(allBounds);
    loadBar.style.width = '100%';
    setTimeout(() => loadBar.style.opacity = '0', 600);

    document.getElementById('status').textContent =
      `${loaded} datasets · ${allItems.length} footprints` +
      (failed ? ` · ${failed} failed` : '');

    updateCount();
  }

  // ── SELECT ITEM ──
  function selectItem(item, row) {
    // deselect previous
    if (activeItem) {
      activeItem.row.classList.remove('active');
      activeItem.item.layer.setStyle({
        weight: 1.5, fillOpacity: 0.12
      });
    }

    activeItem = { item, row };
    row.classList.add('active');
    row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    item.layer.setStyle({ weight: 2.5, fillOpacity: 0.3 });
    map.fitBounds(item.layer.getBounds(), { padding: [60, 60] });

    // populate detail panel
    const c = item.collect;
    const rows = [
      ['Dataset',    item.entry.dataset_name],
      ['Location',   item.entry.location],
      ['Date',       c.startAtUTC?.slice(0,19).replace('T',' ') || '—'],
      ['Satellite',  item.json.umbraSatelliteName || '—'],
      ['Radar band', c.radarBand || '—'],
      ['Polariz.',   c.polarizations?.join(', ') || '—'],
      ['Track',      c.satelliteTrack || '—'],
      ['Incidence',  c.angleIncidenceDegrees != null ? c.angleIncidenceDegrees.toFixed(2) + '°' : '—'],
      ['Az res.',    c.maxGroundResolution ? c.maxGroundResolution.azimuthMeters.toFixed(3) + ' m' : '—'],
      ['Rng res.',   c.maxGroundResolution ? c.maxGroundResolution.rangeMeters.toFixed(3) + ' m' : '—'],
      ['UUID',       item.entry.uuid],
    ];

    document.getElementById('detail-rows').innerHTML = rows.map(([k,v]) =>
      `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`
    ).join('');

    document.getElementById('detail-panel').classList.add('visible');
  }

  // ── FILTER + SEARCH ──
  function filterItems() {
    const loc = document.getElementById('location-filter').value;
    const q   = document.getElementById('search-input').value.toLowerCase();
    let visible = 0;

    document.querySelectorAll('.dataset-item').forEach((row, i) => {
      const item = allItems[i];
      if (!item) return;

      const matchLoc  = !loc || item.entry.location === loc;
      const matchSearch = !q  || item.entry.dataset_name.toLowerCase().includes(q);
      const show = matchLoc && matchSearch;

      row.style.display = show ? '' : 'none';
      if (show) { map.addLayer(item.layer); visible++; }
      else map.removeLayer(item.layer);
    });

    updateCount(visible);
  }

  function updateCount(n) {
    const total = allItems.length;
    const shown = n !== undefined ? n : total;
    document.getElementById('dataset-count').textContent =
      shown === total ? `${total} datasets` : `${shown} / ${total} datasets`;
  }

  document.getElementById('location-filter').addEventListener('change', filterItems);
  document.getElementById('search-input').addEventListener('input', filterItems);

  loadCatalog().catch(e => {
    document.getElementById('status').textContent = 'Error loading catalog';
    console.error(e);
  });
</script>
</body>
</html>
