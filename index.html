<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoInt Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d;
      --accent:#58a6ff; --accent2:#3fb950; --text:#e6edf3;
      --muted:#8b949e; --danger:#f85149; --sidebar-w:300px;
    }
    body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    #header { height:48px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:1000; }
    #header h1 { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.08em; color:var(--accent); text-transform:uppercase; }
    #status { font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-left:auto; }
    .hdr-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; font-family:'IBM Plex Mono',monospace; transition:all 0.15s; }
    .hdr-btn:hover { border-color:var(--accent); color:var(--accent); }
    #load-bar { position:absolute; bottom:0; left:0; height:2px; background:var(--accent); width:0%; transition:width 0.3s; }
    #body { display:flex; flex:1; overflow:hidden; }
    #sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    #sidebar-header { padding:14px; border-bottom:1px solid var(--border); }
    #location-filter, #search-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; padding:8px; border-radius:4px; margin-bottom:8px; }
    #dataset-list { flex:1; overflow-y:auto; }
    .dataset-item { padding:12px; border-bottom:1px solid var(--border); cursor:pointer; font-size:11px; transition: background 0.2s; }
    .dataset-item:hover { background: rgba(88, 166, 255, 0.05); }
    .dataset-item.active { border-left: 3px solid var(--accent); background: rgba(88, 166, 255, 0.1); }
    #detail-panel { padding:14px; background:var(--bg); border-top:1px solid var(--border); display:none; }
    #detail-panel.visible { display:block; }
    #map { flex:1; position:relative; }
    
    /* SAR Transparency Slider */
    #opacity-control {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 18px; border-radius: 30px; z-index: 1000;
      display: none; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #opacity-control.visible { display: flex; }
    #opacity-slider { cursor: pointer; accent-color: var(--accent); width: 120px; }
    .img-btn { font-size:11px; font-family:'IBM Plex Mono',monospace; padding:6px 12px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:none; margin-top:8px; width:100%; }
    .img-btn.load { color:var(--accent2); border-color:#3fb95060; }
    .img-btn.remove { color:var(--danger); border-color:#f8514960; display:none; }
  </style>
</head>
<body>
<div id="header">
  <h1>GeoInt Catalog</h1>
  <button class="hdr-btn" id="reload-btn">Reload</button>
  <span id="status">Initializing...</span>
  <div id="load-bar"></div>
</div>
<div id="body">
  <div id="sidebar">
    <div id="sidebar-header">
      <select id="location-filter"><option value="">All locations</option></select>
      <input id="search-input" type="text" placeholder="Search datasets..."/>
    </div>
    <div id="dataset-list"></div>
    <div id="detail-panel">
      <h3 style="font-size:11px; color:var(--accent); margin-bottom:10px;">COLLECT DETAILS</h3>
      <div id="detail-rows" style="font-size:10px; font-family: 'IBM Plex Mono';"></div>
      <button class="img-btn load" id="load-img-btn">Load GEC Image</button>
      <button class="img-btn remove" id="remove-img-btn">Remove Image</button>
      <div id="img-status" style="font-size:10px; margin-top:8px; color:var(--muted);"></div>
    </div>
  </div>
  <div id="map">
    <div id="opacity-control">
      <span style="font-size:10px; font-family:'IBM Plex Mono'; color:var(--accent);">OPACITY</span>
      <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.9">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gdal3.js@2.8.1/dist/package/gdal3.js"></script>

<script>
'use strict';

var map = L.map('map').setView([0, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

var allItems = [], activeItem = null, gecImageLayer = null;

async function fetchWithRetry(url, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const res = await fetch(url);
      if (res.ok) return res;
    } catch (e) { if (i === retries) throw e; }
    await new Promise(r => setTimeout(r, 400));
  }
}

async function loadCatalog() {
  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('dataset-list');
  statusEl.textContent = 'Fetching catalog...';
  
  try {
    const res = await fetch('catalog/catalog_index.json?t=' + Date.now());
    const entries = await res.json();
    let loaded = 0, failed = 0;

    for (const entry of entries) {
      const row = document.createElement('div');
      row.className = 'dataset-item';
      row.textContent = `⌛ ${entry.dataset_name}`;
      listEl.appendChild(row);

      const jsonPath = entry.json_saved.replace(/^\.\//, 'catalog/').replace(/\\/g, '/');
      try {
        const r = await fetchWithRetry(jsonPath + '?t=' + Date.now());
        const json = await r.json();
        const collect = json.collects[0];
        const latLngs = collect.footprintPolygonLla.coordinates[0].map(c => [c[1], c[0]]);
        const layer = L.polygon(latLngs, { color: '#58a6ff', weight: 1, fillOpacity: 0.1 });
        
        const item = { entry, layer, json, row };
        allItems.push(item);
        row.innerHTML = `<div style="color:var(--muted)">${entry.location}</div><div>${entry.dataset_name}</div>`;
        row.onclick = () => {
          if (activeItem) activeItem.row.classList.remove('active');
          activeItem = item;
          row.classList.add('active');
          map.fitBounds(layer.getBounds());
          showDetails(item);
        };
        loaded++;
      } catch (e) {
        row.innerHTML = `<span style="color:var(--danger)">❌ ${entry.dataset_name}</span>`;
        failed++;
      }
      statusEl.textContent = `Loaded ${loaded}/${entries.length} (${failed} failed)`;
    }
  } catch (e) { statusEl.textContent = 'Catalog Load Error'; }
}

function showDetails(item) {
  document.getElementById('detail-panel').classList.add('visible');
  document.getElementById('detail-rows').innerHTML = `
    <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
      <span>SATELLITE</span><span>${item.json.umbraSatelliteName}</span>
    </div>
    <div style="display:flex; justify-content:space-between;">
      <span>MODE</span><span>${item.json.imagingMode}</span>
    </div>
  `;
}

document.getElementById('load-img-btn').onclick = async () => {
  if (!activeItem) return;
  const status = document.getElementById('img-status');
  const btn = document.getElementById('load-img-btn');
  btn.disabled = true;
  status.textContent = 'Processing GeoTIFF...';

  const prefix = activeItem.entry.s3_prefix.replace('s3://umbra-open-data-catalog/', '');
  const url = `https://umbra-open-data-catalog.s3.us-west-2.amazonaws.com/${prefix}${encodeURIComponent(activeItem.entry.dataset_name)}_GEC.tif`;

  try {
    const Gdal = await initGdalJs({ path: 'https://cdn.jsdelivr.net/npm/gdal3.js@2.8.1/dist/package', useWorker: false });
    const res = await fetch(url);
    const tifFile = new File([await res.arrayBuffer()], 'input.tif');
    const ds = (await Gdal.open([tifFile])).datasets[0];

    // Reproject and create PNG with Transparency (dstnodata 0)
    const warpedPath = await Gdal.gdalwarp(ds, ['-t_srs', 'EPSG:4326', '-of', 'GTiff']);
    const warpedDs = (await Gdal.open([new File([await Gdal.getFileBytes(warpedPath)], 'w.tif')])).datasets[0];
    const info = await Gdal.getInfo(warpedDs);
    
    const pngPath = await Gdal.gdal_translate(warpedDs, ['-of', 'PNG', '-scale', '-outsize', '1024', '0', '-dstnodata', '0']);
    const pngBytes = await Gdal.getFileBytes(pngPath);
    
    const blobUrl = URL.createObjectURL(new Blob([pngBytes], { type: 'image/png' }));
    const corners = info.corners;
    const bounds = [[Math.min(...corners.map(c => c[1])), Math.min(...corners.map(c => c[0]))], 
                    [Math.max(...corners.map(c => c[1])), Math.max(...corners.map(c => c[0]))]];

    if (gecImageLayer) map.removeLayer(gecImageLayer);
    gecImageLayer = L.imageOverlay(blobUrl, bounds, { opacity: 0.9 }).addTo(map);
    document.getElementById('opacity-control').classList.add('visible');
    document.getElementById('remove-img-btn').style.display = 'block';
    status.textContent = 'GEC Loaded ✓';
  } catch (e) { status.textContent = 'Load Failed'; console.error(e); }
  btn.disabled = false;
};

document.getElementById('opacity-slider').oninput = (e) => gecImageLayer && gecImageLayer.setOpacity(e.target.value);
document.getElementById('remove-img-btn').onclick = () => {
  if (gecImageLayer) map.removeLayer(gecImageLayer);
  document.getElementById('opacity-control').classList.remove('visible');
  document.getElementById('remove-img-btn').style.display = 'none';
};

loadCatalog();
</script>
</body>
</html>
