async function loadCatalog() {
  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('dataset-list');
  statusEl.textContent = 'Fetching catalog...';
  
  try {
    const res = await fetch('catalog/catalog_index.json?t=' + Date.now());
    const entries = await res.json();
    let loaded = 0, failed = 0;

    for (const entry of entries) {
      const row = document.createElement('div');
      row.className = 'dataset-item';
      row.textContent = `⌛ ${entry.dataset_name}`;
      listEl.appendChild(row);

      // FIX: Ensure path is correctly constructed from root
      const jsonPath = entry.json_saved.replace(/^\.\//, 'catalog/').replace(/\\/g, '/');
      
      try {
        const r = await fetchWithRetry(jsonPath + '?t=' + Date.now());
        const json = await r.json();
        const collect = json.collects[0];
        const latLngs = collect.footprintPolygonLla.coordinates[0].map(c => [c[1], c[0]]);
        const layer = L.polygon(latLngs, { color: '#58a6ff', weight: 1, fillOpacity: 0.1 });
        
        const item = { entry, layer, json, row };
        allItems.push(item);
        row.innerHTML = `<div style="color:var(--muted)">${entry.location}</div><div>${entry.dataset_name}</div>`;
        row.onclick = () => {
          if (activeItem) activeItem.row.classList.remove('active');
          activeItem = item;
          row.classList.add('active');
          map.fitBounds(layer.getBounds());
          showDetails(item);
        };
        loaded++;
      } catch (e) {
        row.innerHTML = `<span style="color:var(--danger)">❌ ${entry.dataset_name}</span>`;
        console.error(`Failed to load ${jsonPath}:`, e);
        failed++;
      }
      statusEl.textContent = `Loaded ${loaded}/${entries.length} (${failed} failed)`;
    }
  } catch (e) { statusEl.textContent = 'Catalog Load Error'; }
}
