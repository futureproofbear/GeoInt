<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoInt Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d;
      --accent:#58a6ff; --accent2:#3fb950; --text:#e6edf3;
      --muted:#8b949e; --danger:#f85149; --warn:#ffa657;
      --sidebar-w:300px;
    }
    body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    #header { height:48px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:1000; position:relative; }
    #header h1 { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.08em; color:var(--accent); text-transform:uppercase; }
    #status { font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-left:auto; }
    .hdr-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; font-family:'IBM Plex Mono',monospace; transition:all 0.15s; white-space:nowrap; }
    .hdr-btn:hover { border-color:var(--accent); color:var(--accent); }
    .hdr-btn.reload:hover { border-color:var(--accent2); color:var(--accent2); }
    .hdr-btn.reload.spinning { color:var(--accent2); border-color:var(--accent2); animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #load-bar { position:absolute; bottom:0; left:0; height:2px; background:var(--accent); width:0%; transition:width 0.3s; z-index:999; }
    
    #body { display:flex; flex:1; overflow:hidden; }
    #sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition:width 0.2s ease,opacity 0.2s ease; overflow:hidden; }
    #sidebar.collapsed { width:0; opacity:0; pointer-events:none; }
    #sidebar-header { padding:10px 14px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #sidebar-header h2 { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
    
    .sidebar-ctrl-row { display:flex; gap:6px; margin-bottom:6px; }
    #location-filter { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; padding:6px 8px; border-radius:4px; appearance:none; cursor:pointer; }
    #sort-btn { background:var(--bg); border:1px solid var(--border); color:var(--muted); font-size:10px; font-family:'IBM Plex Mono',monospace; padding:0 8px; border-radius:4px; cursor:pointer; }
    #search-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; font-family:'IBM Plex Mono',monospace; padding:6px 8px; border-radius:4px; }
    
    #bulk-row { display:flex; align-items:center; gap:6px; padding:6px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .bulk-btn { font-size:10px; font-family:'IBM Plex Mono',monospace; background:none; border:1px solid var(--border); color:var(--muted); padding:2px 7px; border-radius:3px; cursor:pointer; }
    #dataset-count { font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-left:auto; }
    
    #dataset-list { flex:1; overflow-y:auto; overflow-x:hidden; }
    .dataset-item { padding:10px 14px; border-bottom:1px solid rgba(48,54,61,0.5); display:flex; flex-direction:column; gap:8px; transition:background 0.1s; }
    .dataset-item:hover { background:rgba(88,166,255,0.04); }
    .dataset-item.active { background:rgba(88,166,255,0.08); border-left:3px solid var(--accent); padding-left:11px; }
    
    .item-top-row { display:flex; align-items:flex-start; gap:10px; }
    .item-check-wrap { flex-shrink:0; margin-top:2px; }
    .item-check-wrap input { display:none; }
    .item-check-wrap label { display:block; width:16px; height:16px; border:1px solid var(--border); border-radius:3px; cursor:pointer; position:relative; }
    .item-check-wrap input:checked + label { background:var(--accent); border-color:var(--accent); }
    .item-check-wrap input:checked + label::after { content:''; position:absolute; left:4px; top:1px; width:5px; height:9px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg); }
    
    .item-body { flex:1; cursor:pointer; min-width:0; }
    .item-location { font-size:10px; font-family:'IBM Plex Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
    .item-name { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--text); line-height:1.4; word-break:break-all; }
    
    /* SAR Toggle Switch */
    .sar-toggle-wrap { flex-shrink:0; }
    .sar-toggle-wrap input { display:none; }
    .sar-toggle-wrap label { 
        display:block; width:22px; height:22px; border:1px solid var(--border); border-radius:4px; 
        cursor:pointer; text-align:center; line-height:20px; font-size:12px; color:var(--muted);
        transition: all 0.2s;
    }
    .sar-toggle-wrap input:checked + label { background:var(--accent2); border-color:var(--accent2); color:white; }
    .sar-toggle-wrap.loading label { animation: pulse 1s infinite; color: var(--accent2); }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    .item-meta { display:flex; gap:6px; flex-wrap:wrap; }
    .item-tag { font-size:9px; font-family:'IBM Plex Mono',monospace; padding:1px 4px; border-radius:3px; border:1px solid var(--border); color:var(--muted); }
    
    /* Per-item opacity control */
    .item-opacity-ctrl { display:none; align-items:center; gap:8px; margin-top:4px; padding-top:6px; border-top:1px dashed var(--border); }
    .item-opacity-ctrl.visible { display:flex; }
    .item-opacity-ctrl label { font-size:9px; font-family:'IBM Plex Mono',monospace; color:var(--muted); text-transform:uppercase; }
    .item-opacity-ctrl input { flex:1; height:4px; accent-color: var(--accent2); cursor: pointer; }

    #map { flex:1; position: relative; }
    #detail-panel { border-top:1px solid var(--border); background:var(--bg); flex-shrink:0; display:none; flex-direction:column; max-height:250px; }
    #detail-panel.visible { display:flex; }
    #detail-header { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-bottom:1px solid var(--border); }
    #detail-header h3 { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--accent); text-transform:uppercase; }
    #detail-rows { overflow-y:auto; flex:1; padding:6px 14px; }
    .detail-row { display:flex; justify-content:space-between; font-size:10px; font-family:'IBM Plex Mono',monospace; padding:2px 0; }
    .detail-key { color:var(--muted); }
  </style>
</head>
<body>
<div id="header">
  <h1>GeoInt Catalog</h1>
  <button class="hdr-btn" id="toggle-sidebar">&#9776; Datasets</button>
  <button class="hdr-btn reload" id="reload-btn">&#8635; Reload</button>
  <button class="hdr-btn" id="map-mode-btn">&#9790; Night</button>
  <span id="status">Loading…</span>
  <div id="load-bar"></div>
</div>
<div id="body">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Datasets</h2>
      <div class="sidebar-ctrl-row">
        <select id="location-filter"><option value="">All locations</option></select>
        <button id="sort-btn">Sort: Newest</button>
      </div>
      <input id="search-input" type="text" placeholder="Search dataset name…"/>
    </div>
    <div id="bulk-row">
      <button class="bulk-btn" id="check-all">Check all</button>
      <button class="bulk-btn" id="uncheck-all">Uncheck all</button>
      <span id="dataset-count">—</span>
    </div>
    <div id="dataset-list"></div>
    <div id="detail-panel">
      <div id="detail-header">
        <h3>Collect Details</h3>
        <span id="detail-close" style="cursor:pointer; color:var(--muted)">&#10005;</span>
      </div>
      <div id="detail-rows"></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gdal3.js@2.8.1/dist/package/gdal3.js"></script>

<script>
'use strict';

var map = L.map('map', { zoomControl: true }).setView([0, 0], 2);
var TILES = {
  night: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  day:   'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
};
var currentMode = 'night';
var baseTile = L.tileLayer(TILES.night, { maxZoom: 19 }).addTo(map);

document.getElementById('map-mode-btn').onclick = function() {
  var next = currentMode === 'night' ? 'day' : 'night';
  map.removeLayer(baseTile);
  baseTile = L.tileLayer(TILES[next], { maxZoom: 19 }).addTo(map);
  currentMode = next;
  this.innerHTML = next === 'night' ? '&#9728; Day' : '&#9790; Night';
};

// ── STATE & LAYERS ─────────────────────────────────────────────────────────
var allItems = [];
var gecLayers = {}; // keyed by UUID: { layer, blobUrl, opacity }
var activeItem = null;
var sortDescending = true;
var gdalInstance = null;

async function getGdal() {
    if (!gdalInstance) {
        gdalInstance = await initGdalJs({
            path: 'https://cdn.jsdelivr.net/npm/gdal3.js@2.8.1/dist/package',
            useWorker: false
        });
    }
    return gdalInstance;
}

// ── CATALOG LOADING ────────────────────────────────────────────────────────
async function loadCatalog() {
  var res = await fetch('catalog/catalog_index.json?t=' + Date.now());
  var entries = await res.json();
  var listEl = document.getElementById('dataset-list');
  var loadBar = document.getElementById('load-bar');

  for (let i = 0; i < entries.length; i++) {
    let entry = entries[i];
    let relPath = entry.json_saved.replace(/\\/g, '/').replace(/^\.\//, '').split('/').map(encodeURIComponent).join('/');
    
    try {
      let r = await fetch(relPath + '?t=' + Date.now());
      let json = await r.json();
      
      // Determine format (Legacy vs STAC)
      let isLegacy = !!json.collects;
      let latLngs = isLegacy 
        ? json.collects[0].footprintPolygonLla.coordinates[0].map(c => [c[1], c[0]])
        : json.geometry.coordinates[0].map(c => [c[1], c[0]]);
      
      let dateStr = isLegacy ? json.collects[0].startAtUTC : json.properties.datetime;
      let sat = isLegacy ? json.umbraSatelliteName : json.properties.platform;

      let layer = L.polygon(latLngs, { color: '#58a6ff', weight: 1.5, fillOpacity: 0.1 });
      let cbId = 'cb-' + i;
      let sarId = 'sar-' + i;

      let row = document.createElement('div');
      row.className = 'dataset-item';
      row.innerHTML = `
        <div class="item-top-row">
            <div class="item-check-wrap">
                <input type="checkbox" id="${cbId}">
                <label for="${cbId}"></label>
            </div>
            <div class="item-body">
                <div class="item-location">${entry.location}</div>
                <div class="item-name">${entry.dataset_name}</div>
                <div class="item-meta">
                    <span class="item-tag">${dateStr.slice(0,10)}</span>
                    <span class="item-tag">${sat}</span>
                </div>
            </div>
            <div class="sar-toggle-wrap">
                <input type="checkbox" id="${sarId}">
                <label for="${sarId}" title="Load SAR Image">⛰</label>
            </div>
        </div>
        <div class="item-opacity-ctrl" id="opacity-wrap-${i}">
            <label>Opacity</label>
            <input type="range" min="0" max="1" step="0.01" value="0.9" id="range-${i}">
        </div>
      `;

      let item = { entry, layer, json, row, timestamp: new Date(dateStr).getTime() };
      allItems.push(item);
      listEl.appendChild(row);

      // Event Listeners
      row.querySelector(`#${cbId}`).onchange = e => e.target.checked ? layer.addTo(map) : map.removeLayer(layer);
      row.querySelector('.item-body').onclick = () => selectItem(item);
      
      let sarToggle = row.querySelector(`#${sarId}`);
      let sarWrap = row.querySelector('.sar-toggle-wrap');
      let opacityWrap = row.querySelector(`#opacity-wrap-${i}`);
      let rangeInput = row.querySelector(`#range-${i}`);

      sarToggle.onchange = async (e) => {
          if (e.target.checked) {
              if (gecLayers[entry.uuid]) {
                  gecLayers[entry.uuid].layer.addTo(map);
                  opacityWrap.classList.add('visible');
              } else {
                  sarWrap.classList.add('loading');
                  await loadSarImage(item, i);
                  sarWrap.classList.remove('loading');
                  opacityWrap.classList.add('visible');
              }
          } else {
              if (gecLayers[entry.uuid]) map.removeLayer(gecLayers[entry.uuid].layer);
              opacityWrap.classList.remove('visible');
          }
      };

      rangeInput.oninput = (e) => {
          if (gecLayers[entry.uuid]) gecLayers[entry.uuid].layer.setOpacity(e.target.value);
      };

    } catch(e) { console.error(e); }
    loadBar.style.width = ((i+1)/entries.length*100) + '%';
  }
  updateFilter();
}

async function loadSarImage(item, index) {
    let prefix = item.entry.s3_prefix.replace('s3://umbra-open-data-catalog/', '').replace(/\\/g, '/');
    let url = 'https://umbra-open-data-catalog.s3.us-west-2.amazonaws.com/' + 
              prefix.split('/').map(encodeURIComponent).join('/') + 
              encodeURIComponent(item.entry.dataset_name) + '_GEC.tif';

    try {
        let Gdal = await getGdal();
        let res = await fetch(url);
        let bytes = await res.arrayBuffer();
        let name = `file_${index}.tif`;
        
        let ds = (await Gdal.open([new File([bytes], name)])).datasets[0];
        let warped = await Gdal.gdalwarp(ds, ['-t_srs', 'EPSG:4326', '-of', 'GTiff']);
        await Gdal.close(ds);

        let wBytes = await Gdal.getFileBytes(warped);
        let wDs = (await Gdal.open([new File([wBytes], 'w.tif')])).datasets[0];
        let info = await Gdal.getInfo(wDs);
        
        let png = await Gdal.gdal_translate(wDs, ['-of', 'PNG', '-scale', '-outsize', '1024', '0', '-a_nodata', '0']);
        await Gdal.close(wDs);

        let pngBytes = await Gdal.getFileBytes(png);
        let blobUrl = URL.createObjectURL(new Blob([pngBytes], {type: 'image/png'}));
        
        let corners = info.corners;
        let lngs = corners.map(c => c[0]), lats = corners.map(c => c[1]);
        let bounds = [[Math.min(...lats), Math.min(...lngs)], [Math.max(...lats), Math.max(...lngs)]];
        
        let sarLayer = L.imageOverlay(blobUrl, bounds, { opacity: 0.9 }).addTo(map);
        gecLayers[item.entry.uuid] = { layer: sarLayer, blobUrl: blobUrl };

    } catch(e) {
        alert("Failed to load SAR image: " + item.entry.dataset_name);
        item.row.querySelector('.sar-toggle-wrap input').checked = false;
    }
}

function selectItem(item) {
    if (activeItem) activeItem.row.classList.remove('active');
    activeItem = item;
    item.row.classList.add('active');
    
    let isLegacy = !!item.json.collects;
    let props = isLegacy ? item.json.collects[0] : item.json.properties;
    
    let rows = [
        ['Mode', isLegacy ? item.json.imagingMode : props['sar:instrument_mode']],
        ['Incidence', (isLegacy ? props.angleIncidenceDegrees : props['view:incidence_angle']).toFixed(2) + '°'],
        ['Resolution', isLegacy ? props.maxGroundResolution.azimuthMeters.toFixed(2) + 'm' : props['sar:resolution_azimuth'].toFixed(2) + 'm'],
        ['Pol', isLegacy ? props.polarizations[0] : props['sar:polarizations'][0]]
    ];

    document.getElementById('detail-rows').innerHTML = rows.map(r => `
        <div class="detail-row"><span class="detail-key">${r[0]}</span><span>${r[1]}</span></div>
    `).join('');
    document.getElementById('detail-panel').classList.add('visible');
    map.fitBounds(item.layer.getBounds(), { padding: [50, 50] });
}

function updateFilter() {
    let q = document.getElementById('search-input').value.toLowerCase();
    allItems.forEach(i => {
        let match = i.entry.dataset_name.toLowerCase().includes(q);
        i.row.style.display = match ? 'flex' : 'none';
    });
}

document.getElementById('search-input').oninput = updateFilter;
document.getElementById('detail-close').onclick = () => document.getElementById('detail-panel').classList.remove('visible');

loadCatalog();
</script>
</body>
</html>
