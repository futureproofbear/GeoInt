<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoInt Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f5f5f5; }

    #header {
      padding: 10px 16px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #header h1 { font-size: 15px; font-weight: 600; }
    #status { font-size: 13px; color: #aaa; margin-left: auto; }

    #controls {
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #controls label { font-size: 13px; color: #555; }
    #location-filter {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    #map { flex: 1; }
  </style>
</head>
<body>
  <div id="header">
    <h1>GeoInt Catalog</h1>
    <span id="status">Loading...</span>
  </div>
  <div id="controls">
    <label for="location-filter">Filter by location:</label>
    <select id="location-filter"><option value="">All locations</option></select>
  </div>
  <div id="map"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    const map = L.map('map').setView([0, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // Color per location (cycles through list for multiple locations)
    const COLORS = ['#185FA5', '#0F6E56', '#993C1D', '#993556', '#3B6D11'];
    const locationColors = {};
    let colorIdx = 0;

    function getColor(location) {
      if (!locationColors[location]) {
        locationColors[location] = COLORS[colorIdx++ % COLORS.length];
      }
      return locationColors[location];
    }

    // All layers, keyed by location
    const layersByLocation = {};
    let allLayers = [];

    async function loadCatalog() {
      const res = await fetch('catalog/catalog_index.json');
      const entries = await res.json();

      // Populate location filter dropdown
      const locations = [...new Set(entries.map(e => e.location))].sort();
      const select = document.getElementById('location-filter');
      locations.forEach(loc => {
        const opt = document.createElement('option');
        opt.value = loc;
        opt.textContent = loc;
        select.appendChild(opt);
      });

      // Load each JSON file and draw footprint
      let loaded = 0, failed = 0;
      const allBounds = [];

      for (const entry of entries) {
        // Normalize Windows backslashes and strip leading ./
        const relPath = entry.json_saved
          .replace(/\\/g, '/')
          .replace(/^\.\//, '');

        try {
          const r = await fetch(relPath);
          if (!r.ok) throw new Error(r.status);
          const json = await r.json();

          json.collects.forEach(collect => {
            const layer = addFootprint(collect, json, entry);
            if (layer) {
              allBounds.push(...layer.getLatLngs()[0]);
              const loc = entry.location;
              if (!layersByLocation[loc]) layersByLocation[loc] = [];
              layersByLocation[loc].push(layer);
              allLayers.push(layer);
            }
          });
          loaded++;
        } catch (e) {
          console.warn('Failed to load:', relPath, e);
          failed++;
        }

        document.getElementById('status').textContent =
          `Loading… ${loaded + failed}/${entries.length}`;
      }

      document.getElementById('status').textContent =
        `${loaded} datasets · ${allLayers.length} collects` +
        (failed ? ` · ${failed} failed` : '');

      if (allBounds.length) map.fitBounds(allBounds);
    }

    function addFootprint(collect, json, entry) {
      if (!collect.footprintPolygonLla) return null;

      const coords = collect.footprintPolygonLla.coordinates[0];
      const latLngs = coords.map(c => [c[1], c[0]]);
      const color = getColor(entry.location);

      const poly = L.polygon(latLngs, {
        color: color,
        weight: 1.5,
        fillColor: color,
        fillOpacity: 0.15
      }).addTo(map);

      const center = collect.sceneCenterPointLla?.coordinates;
      const date = collect.startAtUTC
        ? new Date(collect.startAtUTC).toUTCString().slice(0, 16)
        : entry.dataset_name;

      poly.bindPopup(`
        <div style="font-family:sans-serif;font-size:13px;line-height:1.7;min-width:200px">
          <div style="font-weight:600;margin-bottom:2px">${entry.location}</div>
          <div style="color:#555;margin-bottom:6px">${entry.dataset_name}</div>
          <div>Date: ${date}</div>
          ${collect.radarBand ? `<div>Band: ${collect.radarBand}</div>` : ''}
          ${collect.angleIncidenceDegrees != null
            ? `<div>Incidence: ${collect.angleIncidenceDegrees.toFixed(1)}°</div>` : ''}
          ${collect.maxGroundResolution
            ? `<div>Resolution: ${collect.maxGroundResolution.azimuthMeters.toFixed(2)}m az / ${collect.maxGroundResolution.rangeMeters.toFixed(2)}m rng</div>` : ''}
          <div style="margin-top:6px;font-size:11px;color:#999">${entry.uuid}</div>
        </div>
      `);

      return poly;
    }

    // Filter handler
    document.getElementById('location-filter').addEventListener('change', function () {
      const selected = this.value;
      allLayers.forEach(layer => {
        if (!selected) {
          map.addLayer(layer);
        } else {
          const isMatch = layersByLocation[selected]?.includes(layer);
          if (isMatch) map.addLayer(layer); else map.removeLayer(layer);
        }
      });
    });

    loadCatalog();
  </script>
</body>
</html>
